name: Update Progress Badge

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Count lines of code
        id: count
        run: |
          LINES=$(find . -type f ! -path "*/node_modules/*" ! -path "*/dist/*" ! -path "*/.next/*" ! -path "*/coverage/*" -exec cat {} \; | wc -l)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          
          TARGET=1000000
          PERCENT=$((LINES * 100 / TARGET))
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT
          
          echo "Current lines: $LINES"
          echo "Progress: $PERCENT%"
      
      - name: Update badge in README
        run: |
          PERCENT=${{ steps.count.outputs.percent }}
          LINES=${{ steps.count.outputs.lines }}
          
          if [ $PERCENT -ge 100 ]; then
            COLOR="brightgreen"
          elif [ $PERCENT -ge 50 ]; then
            COLOR="yellow"
          elif [ $PERCENT -ge 25 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi
          
          BADGE_URL="https://img.shields.io/badge/progress-${PERCENT}%25-${COLOR}"
          
          sed -i "s|!\[Progress\](.*)|![Progress](${BADGE_URL})|g" README.md
      
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update progress badge: ${{ steps.count.outputs.percent }}% (${{ steps.count.outputs.lines }} lines)"
          git push
